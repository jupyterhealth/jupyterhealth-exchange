{% verbatim %}
<script id="t-profile" type="text/template">

  <h5 class="mt-3">User Profile</h5>
  <table class="table table-striped">
    <tbody>
      <tr>
        <th scope="row">ID</th>
        <td>{{profile.id}}</td>
      </tr>
      <tr>
        <th scope="row">Email</th>
        <td>{{profile.email}}</td>
      </tr>
      <tr>
        <th scope="row">First Name</th>
        <td>{{profile.firstName}}</td>
      </tr>
      <tr>
        <th scope="row">Last Name</th>
        <td>{{profile.lastName}}</td>
      </tr>
      <tr>
        <th scope="row">User Type</th>
        <td>{{profile.userType}}</td>
      </tr>
    </tbody>
  </table>

  <h5 class="mt-5">Dashboard Access Token</h5>
  <p class="text-muted small mb-2">
    A short-lived OAuth access token for this dashboard session. Use it to call the API manually
    (for example from JupyterHealth Client) when not launched via JupyterHub. It expires when the
    session ends; for long-lived programmatic access, create an API Key below.
  </p>
  <div class="d-flex align-items-center gap-2 mb-2">
    <code id="dashboardAccessToken" class="p-2 bg-light rounded text-break flex-grow-1">Click Show to reveal your access token</code>
    <button
      type="button"
      class="btn btn-sm btn-outline-secondary"
      onclick="showDashboardAccessToken()"
    >Show</button>
    <button
      type="button"
      class="btn btn-sm btn-outline-primary"
      onclick="copyDashboardAccessToken(this)"
    ><i class="bi bi-clipboard"></i></button>
  </div>

  <h5 class="mt-5">Admin API Access</h5>
  <table class="table table-striped">
    <thead>
      <tr>
        <th scope="col"></th>
        <th scope="col">Label</th>
        <th scope="col">API Key</th>
      </tr>
    </thead>
    <tbody>
      {{#practitionerClients}}
        <tr>
          <td>
            {{> crudButton iconUpdate=true recordId=id
              onclick="nav('profile',{
                id: this.dataset.recordid,
                update: true
              })"
            }}

            {{> crudButton iconDelete=true recordId=id
              onclick="nav('profile',{
                id: this.dataset.recordid,
                delete: true
              })"
            }}
          </td>
          <td>{{label}}</td>
          <td><code>{{key}}</code>
            <button
              type="button"
              onclick="navigator.clipboard.writeText(this.parentElement.querySelector('code').textContent).then(() => this.disabled = true)"
              class="btn btn-sm btn-outline-primary"
            >
              <i class="bi bi-clipboard"></i>
            </button>
            <button
              type="button"
              onclick="testPractitonerApiKey(this.parentElement.querySelector('code').textContent)"
              class="btn btn-sm btn-outline-success"
            >
              Test
            </button>
          </td>
        </tr>
      {{/practitionerClients}}
    </tbody>
  </table>
  <button type="button"
        class="btn btn-sm btn-success"
        onclick="nav('profile',{
            create: true
        })">
  Create New
  </button>
  <pre class="mt-5" id="testPractitonerApiKeyOutput">
  </pre>


  <!-- MODAL -->
  <div
    class="modal fade"
    id="profile-crudModal"
    data-bs-backdrop="static"
    data-bs-keyboard="false"
    tabindex="-1"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">
            {{#if create}} Create API Key {{/if}}
            {{#if update}} Update API Key {{/if}}
            {{#if delete}} Delete API Key {{/if}}
          </h1>
          <button
            type="button"
            class="btn-close"
            onclick="navReturnFromCrud()"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-warning validationError" style="display: none" role="alert"></div>
          <div class="container-fluid">
            {{#if delete}}
              <div class="alert alert-danger" role="alert">
                Are you sure you want to delete this entire record?
              </div>
            {{/if}}
            <form>
              <fieldset {{#if delete }} disabled {{/if}}>
                {{#unless create}}
                  <div class="mb-3">
                    <fieldset disabled>
                      <label for="practitionerClientId" class="form-label"
                        >ID</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="practitionerClientId"
                        value="{{practitionerClientRecord.id}}"
                      />
                    </fieldset>
                  </div>
                {{/unless}}
                <div class="mb-3">
                  <label for="practitionerClientLabel" class="form-label"
                    >Label</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="practitionerClientLabel"
                    value="{{practitionerClientRecord.label}}"
                  />
                </div>
              </fieldset>
            </form>
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            onclick="navReturnFromCrud()"
          >
            Close
          </button>
          {{#if create}}
            <button type="button" class="btn btn-primary" onclick="createPractitionerClient()">Create</button>
          {{/if}}
          {{#if update}}
            <button type="button" class="btn btn-primary" onclick="updatePractitionerClient({{practitionerClientRecord.id}})">Update</button>
          {{/if}}
          {{#if delete}}
            <button type="button" class="btn btn-danger" onclick="deletePractitionerClient({{practitionerClientRecord.id}})">Delete</button>
          {{/if}}
        </div>
      </div>
    </div>
  </div>
</script>
{% endverbatim %}
